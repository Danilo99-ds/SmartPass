<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMARTPASS v9.2</title>
    <style>
      
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; user-select: none; touch-action: manipulation; }
        
        .screen { display: none; flex-grow: 1; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 10px 10px 40px 10px; box-sizing: border-box; }
        .active-screen { display: flex; }
        
        h1, h2 { margin-bottom: 20px; }
        .btn { padding: 20px; font-size: 1.5em; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; margin: 10px; background-color: #333; transition: transform 0.1s, opacity 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* TELA LOGIN */
        #input-senha { padding: 15px; font-size: 1.5em; border-radius: 10px; border: 1px solid #555; text-align: center; margin-bottom: 20px; background-color: #222; color: white; width: 80%; max-width: 300px; }
        
        #setup-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; max-width: 600px; }
        .btn-serie { background-color: #2c3e50; min-width: 120px; }
        .btn-turma { background-color: #34495e; width: 60px; }
        .selected { border: 3px solid #ffc107; transform: scale(1.05); background-color: #444; }
        #btn-lock { background-color: #27ae60; width: 90%; max-width: 600px; margin-top: 30px; }
        
        
        #alunos-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 12px; 
            width: 98%; 
            flex-grow: 1; /* Faz a lista empurrar o botão pro fundo, mas sem vazar */
            overflow-y: auto; 
            align-content: start; 
            padding: 10px; 
            margin-bottom: 10px;
        }
        .btn-aluno { 
            background-color: #0056b3; 
            font-size: 0.85em; 
            padding: 8px; 
            min-height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            word-break: break-word; 
            line-height: 1.2;
        }
        .btn-aluno.used { background-color: #333; color: #666; border: 1px solid #444; }
        
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #222; padding: 30px; border-radius: 15px; border: 1px solid #555; width: 80%; max-width: 500px; text-align: center; }
        .modal-actions { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn-confirm { background-color: #28a745; flex: 1; }
        .btn-cancel { background-color: #dc3545; flex: 1; }
        #tela-ocupado { background-color: #000; }
        .ocupado-info { font-size: 3em; color: #dc3545; font-weight: bold; margin-bottom: 10px; }
        .ocupado-sub { font-size: 2.2em; color: #fff; margin-bottom: 30px; }
        #hidden-timer { opacity: 0; pointer-events: none; } 
        @keyframes flash-alert { 0% { background-color: #000; } 50% { background-color: #500; } 100% { background-color: #000; } }
        .alert-mode { animation: flash-alert 1s infinite; }
        .alert-text { color: #ffcc00; font-size: 1.8em; font-weight: bold; display: none; margin-top: 20px; border: 2px solid #ffcc00; padding: 10px; border-radius: 10px; }
        #queue-btn { background-color: #ffc107; color: #000; width: 80%; margin-top: 20px; }
        #queue-list { text-align: left; width: 80%; margin-top: 15px; max-height: 150px; overflow-y: auto; border: 1px dashed #555; padding: 10px; }
        #tela-bloqueio { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; background-color: #800000; z-index: 2147483647; flex-direction: column; justify-content: center; align-items: center; }
        #bloqueio-timer { font-size: 8em; font-weight: bold; }
        #btn-unlock-punish { background-color: #fff; color: #800; border: none; font-size: 1.2em; padding: 15px 30px; margin-top: 30px; }
        .admin-btn { position: fixed; width: 50px; height: 50px; background: rgba(255,255,255,0.1); color: #fff; font-size: 1.2em; border: 1px solid #555; border-radius: 50%; cursor: pointer; z-index: 3000; display: flex; justify-content: center; align-items: center; }
        #btn-reset { bottom: 10px; right: 10px; background-color: #a90000; } 
        #btn-punish { top: 10px; left: 10px; color: #ffa500; border-color: #ffa500;} 
        #status-envio { position: fixed; top: 10px; right: 10px; font-size: 0.8em; color: #aaa; z-index: 2000; }
    </style>
</head>
<body>

    <div id="status-envio"></div>

    <div id="tela-login" class="screen active-screen">
        <img src="logo.png" alt="Logo" style="max-height: 80px; margin-bottom: 10px;">
        <h2 style="color: #ffc107;">Acesso Restrito</h2>
        <p style="color: #aaa; margin-bottom: 20px;">Insira a senha para configurar a aula</p>
        
        <input type="tel" id="input-senha" placeholder="Senha" autocomplete="off">
        <button class="btn" style="background-color: #0056b3; width: 80%; max-width: 300px;" onclick="verificarLogin()">ENTRAR</button>
    </div>

    <div id="tela-setup" class="screen">
        <img src="logo.png" alt="Logo" style="max-height: 120px; margin-bottom: 15px;">
        <h2>Configuração Inicial</h2>
        <div style="margin-bottom: 5px; color:#aaa">1. Escolha a Série:</div>
        <div id="grid-series" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px;"></div>
        <div style="margin-bottom: 5px; color:#aaa">2. Escolha a Turma:</div>
        <div id="grid-turmas" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-turma" onclick="selectClass('A', this)">A</button>
            <button class="btn btn-turma" onclick="selectClass('B', this)">B</button>
            <button class="btn btn-turma" onclick="selectClass('C', this)">C</button>
            <button class="btn btn-turma" onclick="selectClass('D', this)">D</button>
            <button class="btn btn-turma" onclick="selectClass('E', this)">E</button>
        </div>
    <div style="margin: 20px 0; font-size: 1.2em; background: #222; padding: 15px; border-radius: 10px; border: 1px dashed #555;">
    	<input type="checkbox" id="check-simulado" style="transform: scale(1.8); margin-right: 15px; cursor: pointer;">
    	<label for="check-simulado" style="cursor: pointer; font-weight: bold; color: #ffc107;">Dia de Simulado / V.A.</label>
</div>
        <button id="btn-lock" class="btn" onclick="lockClass()">INICIAR AULA</button>
    </div>

   <div id="tela-principal" class="screen">
        <h2 id="titulo-turma" style="color: #4da6ff;">Turma</h2>
        <div id="alunos-container"></div>
        
        <button class="btn" style="background-color: #6c757d; width: 90%; max-width: 500px; margin-bottom: 10px;" onclick="voltarParaTurmas()">Voltar / Cancelar</button>
    </div>

    <div id="tela-motivo" class="screen">
        <h2 id="motivo-titulo">Olá! Para onde?</h2>
        <div style="display: flex; flex-direction: column; width: 90%; max-width: 500px; gap: 15px;">
            <button class="btn" style="background-color: #007bff;" onclick="preConfirm('Banheiro')">Ir ao Banheiro</button>
            <button class="btn" style="background-color: #17a2b8;" onclick="preConfirm('Beber Água')">Beber Água</button>
            <button class="btn" style="background-color: #6c757d;" onclick="goTo('tela-principal')">Cancelar</button>
        </div>
    </div>

    <div id="tela-ocupado" class="screen">
        <img src="logo.png" alt="Logo" style="max-height: 80px; margin-bottom: 10px;">
        <div class="ocupado-info">ALUNO FORA DA SALA</div>
        <div class="ocupado-sub" id="ocupado-nome">...</div>
        <div class="ocupado-sub" id="ocupado-motivo" style="font-size: 1.5em; color: #888;">...</div>
        <div id="hidden-timer">00:00</div>
        <div id="alert-msg" class="alert-text">⚠️ TEMPO EXCEDIDO (8 MIN) ⚠️</div>
        <button class="btn" style="background-color: #28a745; width: 80%; max-width: 500px; padding: 30px;" onclick="retornar()">VOLTEI</button>
        <div style="margin-top: 30px; width: 100%; display:flex; flex-direction:column; align-items:center;">
            <button class="btn" id="queue-btn" onclick="entrarFila()">Entrar na Fila</button>
            <div id="queue-list"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="conf-titulo" style="color: #ffc107;">Confirmação</h2>
            <p id="conf-msg" style="font-size: 1.3em; margin: 20px 0;">Você confirma a saída?</p>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Não</button>
                <button class="btn btn-confirm" onclick="confirmExit()">Sim</button>
            </div>
        </div>
    </div>

    <div id="tela-bloqueio">
        <h1 style="font-size: 3em;">⚠️ SISTEMA TRAVADO ⚠️</h1>
        <h2 id="bloqueio-timer" style="font-size: 6em;">10:00</h2>
        <button id="btn-unlock-punish" class="btn" onclick="togglePunish()">DESBLOQUEAR (Senha)</button>
    </div>

    <button id="btn-reset" class="admin-btn" onclick="adminReset()">↺</button>
    <button id="btn-punish" class="admin-btn" onclick="togglePunish()">!</button>

        const timeToMin = (str) => {
            const [h, m] = str.split(':').map(Number);
            return h * 60 + m;
        };

        function verificarRegrasHorario(serie) {
            const grade = ["6º Ano", "7º Ano", "8º Ano"].includes(serie) ? HORARIOS_FUNDAMENTAL : HORARIOS_MEDIO;
            const now = new Date();
            const minAtual = now.getHours() * 60 + now.getMinutes();

            for (let i = 0; i < grade.length; i++) {
                const inicioMin = timeToMin(grade[i].inicio);
                const fimMin = timeToMin(grade[i].fim);

                if (minAtual >= inicioMin && minAtual < fimMin) {
                    return grade[i]; 
                }
            }
            return { nome: "Fora do Horário", bloqueado: true, indiceAula: -1 };
        }

        function getMateriaAtual(serie, turma, indiceAula) {
            const diaSemana = new Date().getDay(); 
            if (GRADE_AULAS[serie] && GRADE_AULAS[serie][turma] && GRADE_AULAS[serie][turma][diaSemana]) {
                const materiasDoDia = GRADE_AULAS[serie][turma][diaSemana];
                if(indiceAula >= 0 && indiceAula < materiasDoDia.length) {
                    return " - " + materiasDoDia[indiceAula];
                }
            }
            return "";
        }

        function enviarDadosParaPlanilha(dados) {
            const statusDiv = document.getElementById('status-envio');
            statusDiv.innerText = "Enviando dados...";
            
            if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "" || GOOGLE_SCRIPT_URL === "") {
                statusDiv.innerText = "Offline: URL não configurada.";
                return;
            }
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            })
            .then(() => {
                statusDiv.innerText = "Dados salvos na nuvem ✔️";
                setTimeout(() => statusDiv.innerText = "", 3000);
            }).catch(() => statusDiv.innerText = "Erro ao salvar na nuvem");
        }

        function lockClass() {
            if(!selectedSerie || !selectedTurma) return alert("Selecione Série e Turma!");
            
            
            const checkSimulado = document.getElementById('check-simulado');
            if(checkSimulado) {
                isSimuladoMode = checkSimulado.checked;
            } else {
                isSimuladoMode = false;
            }

            const container = document.getElementById('alunos-container');
            container.innerHTML = "";
            if(!dbAlunos[selectedSerie][selectedTurma]) return alert("Turma sem alunos cadastrados.");
            dbAlunos[selectedSerie][selectedTurma].sort().forEach(nome => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-aluno'; btn.innerText = nome;
                btn.onclick = () => preSelection(nome);
                container.appendChild(btn);
            });
            document.getElementById('titulo-turma').innerText = `${selectedSerie} - Turma ${selectedTurma}`;
            goTo('tela-principal');
            
            
            aulaAtualRegistrada = verificarRegrasHorario(selectedSerie).nome;
            if(verificadorAulaInterval) clearInterval(verificadorAulaInterval);
            verificadorAulaInterval = setInterval(verificarViradaDeAula, 10000);
        }

        function preSelection(nome) {
            if(isPunished) return alert("SISTEMA TRAVADO PELA DIREÇÃO."); 

            const statusAula = verificarRegrasHorario(selectedSerie);
            if(statusAula.bloqueado && !isSimuladoMode) {
                return alert(`⛔ SAÍDA NÃO PERMITIDA ⛔.\nMotivo: ${statusAula.nome}\nO SMARTPASS bloqueia saídas no 1º Horário e logo após o Intervalo.`);
            }

            if(activeStudent && activeStudent.nome === nome) return alert("Você já está fora da sala!");
            if(queue.some(q => q.nome === nome)) return alert("Você já está na fila de espera!");
            if(studentsUsed.includes(nome)) return alert("Você já saiu hoje.");

            if(isQueueing) {
                tempAluno = nome;
                let tituloEl = document.getElementById('motivo-titulo');
                if(tituloEl) tituloEl.innerText = `Olá, ${nome.split(' ')[0]}! Para onde?`;
                goTo('tela-motivo');
                return;
            }

            if(activeStudent) return alert("Aguarde! Já tem um aluno fora da sala.");
            
            tempAluno = nome;
            let tituloEl = document.getElementById('motivo-titulo');
            if(tituloEl) tituloEl.innerText = `Olá, ${nome.split(' ')[0]}! Para onde?`;
            goTo('tela-motivo');
        }

        function preConfirm(motivo) {
            tempMotivo = motivo;
            if(isQueueing) {
                queue.push({ nome: tempAluno, motivo: tempMotivo });
                isQueueing = false; updateQueueUI();
                let tituloEl = document.getElementById('aluno-titulo');
                if(tituloEl) tituloEl.innerText = "Quem é você?"; 
                renderizarTelaOcupado(); goTo('tela-ocupado');
            } else {
                document.getElementById('conf-msg').innerText = `${tempAluno}, confirma saída para: ${motivo}?`;
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        }

        function startSession(nome, motivo) {
            activeStudent = { nome: nome, motivo: motivo, timeStart: new Date() };

        }

        function renderizarTelaOcupado() {
            if(activeStudent) {
                document.getElementById('ocupado-nome').innerText = activeStudent.nome;
                document.getElementById('ocupado-motivo').innerText = activeStudent.motivo;
                const diff = Math.floor((new Date() - activeStudent.timeStart) / 1000);
                if(diff > TIME_LIMIT_SECONDS) {
                    document.getElementById('tela-ocupado').classList.add('alert-mode');
                    document.getElementById('alert-msg').style.display = 'block';
                }
            } 
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!activeStudent) return;
                const diff = Math.floor((new Date() - activeStudent.timeStart) / 1000); 
                if(diff > TIME_LIMIT_SECONDS) {
                    document.getElementById('tela-ocupado').classList.add('alert-mode');
                    document.getElementById('alert-msg').style.display = 'block';
                }
            }, 1000);
        }

        function retornar() {
            if(!activeStudent) return;
            const now = new Date();
            const diff = Math.floor((now - activeStudent.timeStart) / 1000);
            const timeString = `${String(Math.floor(diff / 60)).padStart(2,'0')}:${String(diff % 60).padStart(2,'0')}`;
            
            let infoFinalAula = "";
            if (isSimuladoMode) {
                infoFinalAula = "Dia de Simulado / V.A.";
            } else {
                const aula = verificarRegrasHorario(selectedSerie);
                const materia = getMateriaAtual(selectedSerie, selectedTurma, aula.indiceAula);
                infoFinalAula = aula.nome + materia;
            }

            enviarDadosParaPlanilha({
                data: now.toLocaleDateString(),
                horaSaida: activeStudent.timeStart.toLocaleTimeString(),
                horaVolta: now.toLocaleTimeString(),
                duracao: timeString,
                aluno: activeStudent.nome,
                turma: `${selectedSerie} - ${selectedTurma}`,
                motivo: activeStudent.motivo,
                aulaInfo: infoFinalAula
            });

            studentsUsed.push(activeStudent.nome);
            document.querySelectorAll('.btn-aluno').forEach(b => {
                if(b.innerText === activeStudent.nome) { b.classList.add('used'); b.disabled = true; }
            });

            activeStudent = null; 
            clearInterval(timerInterval);
            document.getElementById('tela-ocupado').classList.remove('alert-mode');
            document.getElementById('alert-msg').style.display = 'none';
            
            if(queue.length > 0) {
                const statusAulaAtual = verificarRegrasHorario(selectedSerie);
                
              			  if(statusAulaAtual.bloqueado && !isSimuladoMode) {
                    alert(`Fila pausada! A aula atual (${statusAulaAtual.nome}) não permite saídas.`);
                    goTo('tela-principal');
                } else {
                    const next = queue.shift();
                    updateQueueUI();
                    startSession(next.nome, next.motivo);
                }
            } else {
                goTo('tela-principal');
            }
        }

        function updateQueueUI() {
            const list = document.getElementById('queue-list');
            if(queue.length === 0) list.style.display = 'none';
            else {
                list.style.display = 'block';
                list.innerHTML = queue.map((q, i) => `<div style='border-bottom:1px solid #333; padding:5px;'>${i+1}. ${q.nome} (${q.motivo})</div>`).join('');
            }
        }

        function goTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));

        }

        function togglePunish() {
            const pass = prompt("Senha Bloqueio:");
            if(pass === TEACHER_PASSWORD) {
                if(!isPunished) {
                    isPunished = true; let time = 600;
                    document.getElementById('tela-bloqueio').style.display = 'flex';
                    punishInterval = setInterval(() => {
                        time--;
                        document.getElementById('bloqueio-timer').innerText = `${Math.floor(time/60)}:${String(time%60).padStart(2,'0')}`;
                        if(time <= 0) togglePunish(); 
                    }, 1000);
                } else {
                    isPunished = false; clearInterval(punishInterval);
                    document.getElementById('tela-bloqueio').style.display = 'none';
                }
            } else if(pass !== null) alert("Senha incorreta.");
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
